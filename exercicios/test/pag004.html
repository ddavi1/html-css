<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon/Martin-Berube-Food-Banana.ico" type="image/x-icon">
    <title>Imagens dinamicas</title>
</head>
<body>
    <h1>Carregando imagem</h1>
    <picture>
        <source media="(max-width: 350px )" srcset="flex/foto-p.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="flex/foto-m.png" type="image/png">
        <img src="flex/foto-g.png" alt="flex">
    </picture>

    <h1>Carregando audio</h1>

    <audio preload="metadata" controls autoplay loop>

        <source src="audio/audio-1.mp3" type="audio/mp3">
        <source src="audio/audio-2.wav" type="audio/wave">
        <p>Seu navegador nao é compativel com o audio, faça o download dele <a href="audio/audio-1.mp3">aqui</a> </p>
        
    </audio>
</body>
</html>
