<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando sombras</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: peachpuff;
            
        }
        
        article#caixa {
            background-color: snow;
            width: 400px;
            margin: 0 auto;
            padding: 1px 20px;
            box-shadow: 2px 3px 1px black;
            
        }
        article > p {
            color: rgb(45, 173, 45);
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

        }


        span {
                background-color: rgb(225, 232, 17);
        }

        span > a {
                text-decoration: none;

        }

        a:hover {
            color: rgb(246, 8, 8);
            text-decoration: underline;
        }
        article{
            border-radius: 10px;
        }

    </style>
</head>
<body>
    <article id="caixa">
        <h1>Curso Completo De Javascript</h1>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Sequi esse natus beatae nisi, qui suscipit voluptas? <span><a href="#">Alias quam voluptatem</a></span> vel quidem explicabo eius.</p>
    </article>
</body>
</html>
